name: EcoSure ingest

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min, UTC
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

# prevent two runs from overlapping
concurrency:
  group: ecosure-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # service-account JSON is stored as a secret; write it to a file
      - name: Write Google credentials
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > /tmp/gcreds.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Run poller
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcreds.json
        run: python gmail_poller.py
